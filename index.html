      { id: 'acre',label: 'Acre',          short: 'ac',  factor: 4046.856 },

  },
  weight: {
    name: 'Weight',
    base: 'g',
    defaults: ['kg', 'st_lb'],
    units: [
      { id: 'mg',    label: 'Milligram',  short: 'mg',  factor: 0.001 },
      { id: 'g',     label: 'Gram',       short: 'g',   factor: 1 },
      { id: 'kg',    label: 'Kilogram',   short: 'kg',  factor: 1000 },
      { id: 't',     label: 'Tonne',      short: 't',   factor: 1e6 },
      { id: 'oz',    label: 'Ounce',      short: 'oz',  factor: 28.3495 },
      { id: 'lb',    label: 'Pound',      short: 'lb',  factor: 453.592 },
      { id: 'st_lb', label: 'Stones & Pounds', short: 'st.lb' },
      { id: 'ton_uk',label: 'UK Ton',     short: 'long tn', factor: 1016046.91 },
      { id: 'ton_us',label: 'US Ton',     short: 'short tn', factor: 907184.74 },
    ],
    // st_lb is a composite encoded as ST.LL (e.g. 11.05 = 11 stones 5 pounds)
    toBase: (v, u) => {
      if (u === 'st_lb') {
        const stones = Math.trunc(v);
        const lbs = Math.round((Math.abs(v) - Math.abs(stones)) * 100) * (v < 0 ? -1 : 1);
        return (stones * 14 + lbs) * 453.592;
      }
      const unit = CATEGORIES.weight.units.find(x => x.id === u);
      return v * unit.factor;
    },
    fromBase: (v, u) => {
      if (u === 'st_lb') {
        const totalLb = v / 453.592;
        const sign = totalLb < 0 ? -1 : 1;
        const abs = Math.abs(totalLb);
        const stones = Math.floor(abs / 14);
        const lbs = Math.round(abs - stones * 14);
        if (lbs === 14) return sign * (stones + 1);
        const pad = lbs < 10 ? `0${lbs}` : `${lbs}`;
        return sign * Number(`${stones}.${pad}`);
      }
      const unit = CATEGORIES.weight.units.find(x => x.id === u);
      return v / unit.factor;
    },

    units: [
      { id: 'c',   label: 'Celsius',    short: '°C' },

        if (v <= 0.25) return 110;

    fromBase: (v, u) => {
      if (u === 'c') return v;
      if (u === 'f') return v * 9/5 + 32;

        if (v <= 110) return 0.25;

      if (u === 'm') return v * 100;

    fromBase: (v, u) => {
      if (u === 'cm') return v;

function convert(categoryId, value, fromId, toId) {
  const cat = CATEGORIES[categoryId];
  if (!cat || value === '' || value === null || isNaN(value)) return '';
  const v = Number(value);
  let base;
  if (cat.toBase) base = cat.toBase(v, fromId);
  else            base = v * cat.units.find(x => x.id === fromId).factor;
  let out;
  if (cat.fromBase) out = cat.fromBase(base, toId);
  else              out = base / cat.units.find(x => x.id === toId).factor;
  return out;
}

function formatValue(v, unitId, categoryId) {
  if (v === '' || v === null || v === undefined || isNaN(v)) return '';
  if (categoryId === 'weight' && unitId === 'st_lb') {
    const sign = v < 0 ? '-' : '';
    const abs = Math.abs(v);
    const stones = Math.trunc(abs);
    const lbs = Math.round((abs - stones) * 100);
    return `${sign}${stones} st ${lbs} lb`;
  }
  if (categoryId === 'height' && unitId === 'ftin') {
    const feet = Math.floor(v);
    const inches = Math.round((v - feet) * 12 * 10) / 10;
    if (inches >= 12) return `${feet + 1}' 0"`;
    return `${feet}' ${inches}"`;
  }
  if (categoryId === 'cooking' && unitId === 'gas') {
    if (v <= 0.3) return '¼';
    if (v <= 0.6) return '½';
    return String(Math.round(v * 10) / 10);
  }
  const abs = Math.abs(v);
  if (abs === 0) return '0';
  if (abs >= 1000000) return v.toExponential(4);
  if (abs >= 100) return (Math.round(v * 100) / 100).toLocaleString();
  if (abs >= 1) return (Math.round(v * 10000) / 10000).toString();
  if (abs >= 0.01) return (Math.round(v * 100000) / 100000).toString();
  return v.toPrecision(4);
}

function ConversionScreen({ categoryId, onBack, onRecord }) {
  const cat = CATEGORIES[categoryId];
  const color = CATEGORY_COLORS[categoryId];
  const [fromUnit, setFromUnit] = useState(cat.defaults[0]);
  const [toUnit, setToUnit] = useState(cat.defaults[1]);
  const [value, setValue] = useState(categoryId === 'temperature' ? '100' : categoryId === 'cooking' ? '180' : '1');
  const [swapRot, setSwapRot] = useState(0);
  const [recorded, setRecorded] = useState(null);

  const parsedValue = useMemo(() => {
    if (value === '' || value === '-') return 0;
    if (categoryId === 'weight' && fromUnit === 'st_lb') {
      const m = String(value).match(/^(-?)(\d*)(?:\.(\d{0,2}))?$/);
      if (!m) return Number(value) || 0;
      const sign = m[1] === '-' ? -1 : 1;
      const stones = m[2] === '' ? 0 : parseInt(m[2], 10);
      const lbsStr = m[3] || '';
      let lbs = lbsStr === '' ? 0 : parseInt(lbsStr, 10);
      if (lbs > 13) lbs = 13;
      const pad = lbs < 10 ? `0${lbs}` : `${lbs}`;
      return sign * Number(`${stones}.${pad}`);
    }
    return Number(value);
  }, [value, fromUnit, categoryId]);

  const result = useMemo(() => convert(categoryId, parsedValue, fromUnit, toUnit), [parsedValue, fromUnit, toUnit, categoryId]);
  const fromU = cat.units.find(u => u.id === fromUnit);
  const toU = cat.units.find(u => u.id === toUnit);

  useEffect(() => {
    if (value === '' || isNaN(Number(value))) return;
    const t = setTimeout(() => {
      const entry = {
        id: Date.now(),
        category: categoryId,
        from: fromUnit, to: toUnit,
        fromValue: parsedValue,
        toValue: result,
        ts: Date.now(),
      };
      if (recorded !== `${value}-${fromUnit}-${toUnit}`) {
        onRecord(entry);
        setRecorded(`${value}-${fromUnit}-${toUnit}`);
      }
    }, 500);
    return () => clearTimeout(t);
  }, [value, fromUnit, toUnit, result, categoryId]);

  const handleSetFromUnit = (newU) => {
    if (categoryId === 'weight') {
      if (newU === 'st_lb' && fromUnit !== 'st_lb') setValue('11');
      if (newU !== 'st_lb' && fromUnit === 'st_lb') setValue('1');
    }
    setFromUnit(newU);
  };

  const swap = () => {
    setSwapRot(r => r + 180);
    setFromUnit(toUnit); setToUnit(fromUnit);
    if (categoryId === 'weight' && toUnit === 'st_lb') {
      const abs = Math.abs(result);
      const stones = Math.trunc(abs);
      const lbs = Math.round((abs - stones) * 100);
      setValue(`${result < 0 ? '-' : ''}${stones}${lbs ? `.${lbs}` : ''}`);
    } else {
      setValue(formatValue(result, toUnit, categoryId).replace(/[^\d.\-]/g, '') || '0');
    }
  };

  const clear = () => setValue('');

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', background:'#FAFAFB' }}>
      <StatusBar color="#fff" bg={color.deep} />
      <div style={{
        background: `linear-gradient(160deg, ${color.bg} 0%, ${color.deep} 100%)`,
        padding: '10px 14px 22px', color: '#fff',
        borderBottomLeftRadius: 28, borderBottomRightRadius: 28,
      }}>
        <div style={{ display:'flex', alignItems:'center', gap: 4 }}>
          <button onClick={onBack} style={{
            all:'unset', cursor:'pointer', width:40, height:40,
            display:'flex', alignItems:'center', justifyContent:'center',
            borderRadius: 12,
          }}>
            <div style={{ width: 22, height: 22, color:'#fff' }}>{ICONS.back}</div>
          </button>
          <div style={{ flex:1, display:'flex', alignItems:'center', gap: 10 }}>
            <div style={{ width: 26, height: 26, color:'#fff' }}>{ICONS[categoryId]}</div>
            <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.3 }}>{cat.name}</div>
          </div>
          <button onClick={clear} style={{
            all:'unset', cursor:'pointer', width:40, height:40,
            display:'flex', alignItems:'center', justifyContent:'center',
            borderRadius: 12,
          }}>
            <div style={{ width: 22, height: 22, color:'#fff' }}>{ICONS.trash}</div>
          </button>
        </div>

        <div style={{
          marginTop: 14, background: 'rgba(255,255,255,0.14)',
          borderRadius: 20, padding: 16, backdropFilter: 'blur(6px)',
          border: '1px solid rgba(255,255,255,0.2)',
        }}>
          <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', gap: 10 }}>
            <div style={{ fontSize: 11, fontWeight: 700, opacity: 0.85, letterSpacing: 1.2, textTransform:'uppercase' }}>
              From · {fromU.short}
            </div>
            {fromUnit === 'st_lb' && (
              <div style={{ fontSize: 10, fontWeight: 600, opacity: 0.75, fontStyle:'italic' }}>
                Type as st.lb · e.g. 11.5 = 11 st 5 lb
              </div>
            )}
          </div>
          <input
            value={value}
            onChange={e => {
              const v = e.target.value;
              if (v === '' || v === '-' || /^-?\d*\.?\d*$/.test(v)) setValue(v);
            }}
            inputMode="decimal"
            style={{
              width: '100%', boxSizing: 'border-box',
              background: 'transparent', border: 'none', outline: 'none',
              color: '#fff', fontSize: 38, fontWeight: 800, letterSpacing: -1,
              fontFamily: '"Plus Jakarta Sans", system-ui, sans-serif',
              marginTop: 4, padding: 0,
              caretColor: '#fff',
            }}
          />
          {fromUnit === 'st_lb' && value !== '' && value !== '-' && (
            <div style={{ fontSize: 12, fontWeight: 600, opacity: 0.85, marginTop: -2 }}>
              {formatValue(parsedValue, 'st_lb', 'weight')}
            </div>
          )}
          <div style={{ height: 1, background: 'rgba(255,255,255,0.25)', margin: '6px 0 14px' }}/>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', gap: 10 }}>
            <div style={{ flex:1, minWidth: 0 }}>
              <div style={{ fontSize: 11, fontWeight: 700, opacity: 0.85, letterSpacing: 1.2, textTransform:'uppercase' }}>
                To · {toU.short}
              </div>
              <div style={{
                fontSize: 30, fontWeight: 800, marginTop: 4, letterSpacing: -0.8,
                overflowWrap:'anywhere', lineHeight: 1.1,
              }}>
                {formatValue(result, toUnit, categoryId) || '—'}
              </div>
            </div>
            <button onClick={swap} style={{
              all:'unset', cursor:'pointer', flexShrink: 0,
              width: 52, height: 52, borderRadius: 18,

              display:'flex', alignItems:'center', justifyContent:'center',

            }}>
              <div style={{ width: 24, height: 24 }}>{ICONS.swap}</div>
            </button>
          </div>
        </div>
      </div>

      <div style={{
        flex: 1, overflow: 'auto',
        display: 'grid', gridTemplateColumns: '1fr 1fr',
        gap: 0, padding: '18px 0 20px',
      }}>
        <UnitColumn title="From" units={cat.units} selected={fromUnit} onSelect={handleSetFromUnit} color={color}/>
        <UnitColumn title="To"   units={cat.units} selected={toUnit}   onSelect={setToUnit}        color={color}/>
      </div>

      {categoryId === 'currency' && (

        </div>
      )}
    </div>
  );
}

      <StatusBar color="#fff" bg={accent.deep} />
      <div style={{
        background: `linear-gradient(160deg, ${accent.bg} 0%, ${accent.deep} 100%)`,
        padding: '10px 14px 26px', color: '#fff',
        borderBottomLeftRadius: 28, borderBottomRightRadius: 28,
      }}>
        <div style={{ display:'flex', alignItems:'center', gap: 4 }}>
          <button onClick={onBack} style={{
            all:'unset', cursor:'pointer', width:40, height:40,
            display:'flex', alignItems:'center', justifyContent:'center',
          }}>
            <div style={{ width: 22, height: 22, color:'#fff' }}>{ICONS.back}</div>
          </button>
          <div style={{ flex:1, fontSize: 20, fontWeight: 800, letterSpacing: -0.3 }}>Recent conversions</div>
          {history.length > 0 && (
            <button onClick={onClear} style={{
              all:'unset', cursor:'pointer', padding: '8px 12px',
              fontSize: 12, fontWeight: 700, color:'#fff',
              background:'rgba(255,255,255,0.18)', borderRadius: 10,
            }}>Clear</button>
          )}
        </div>
      </div>

      <div style={{ flex: 1, overflow: 'auto', padding: '14px 16px 24px' }}>
        {history.length === 0 ? (
          <div style={{
            padding: '60px 20px', textAlign: 'center',
            color: '#9B9BA3',
          }}>
            <div style={{
              width: 72, height: 72, margin: '0 auto 18px',
              borderRadius: 24, background: '#EEEFF3',
              display:'flex', alignItems:'center', justifyContent:'center',
              color: '#B8B8C0',
            }}>
              <div style={{ width: 36, height: 36 }}>{ICONS.history}</div>
            </div>
            <div style={{ fontSize: 15, fontWeight: 700, color:'#3B3B45' }}>No recents yet</div>
            <div style={{ fontSize: 13, marginTop: 6 }}>Your conversions will appear here.</div>
          </div>
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap: 10 }}>
            {history.map(h => {
              const cat = CATEGORIES[h.category];
              const color = CATEGORY_COLORS[h.category];
              const fromU = cat.units.find(u => u.id === h.from);
              const toU = cat.units.find(u => u.id === h.to);
              return (
                <button key={h.id} onClick={() => onOpen(h.category)} style={{
                  all:'unset', cursor:'pointer', display:'flex', gap: 12, alignItems:'center',
                  padding: 12, background: '#fff',
                  borderRadius: 16, boxShadow: '0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04)',
                }}>
                  <div style={{
                    width: 44, height: 44, borderRadius: 14,
                    background: color.bg, color:'#fff',
                    display:'flex', alignItems:'center', justifyContent:'center', flexShrink: 0,
                  }}>
                    <div style={{ width: 22, height: 22 }}>{ICONS[h.category]}</div>
                  </div>
                  <div style={{ flex:1, minWidth: 0 }}>
                    <div style={{ fontSize: 11, color: color.deep, fontWeight: 800, letterSpacing: 0.8, textTransform:'uppercase' }}>
                      {cat.name}
                    </div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: '#2A2A33', marginTop: 2, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                      {formatValue(h.fromValue, h.from, h.category)} {fromU.short}
                      <span style={{ color:'#B8B8C0', margin: '0 6px' }}>→</span>
                      {formatValue(h.toValue, h.to, h.category)} {toU.short}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

      <StatusBar color="#fff" bg={accent.deep} />
      <div style={{
        background: `linear-gradient(160deg, ${accent.bg} 0%, ${accent.deep} 100%)`,
        padding: '14px 20px 26px', color: '#fff',
        borderBottomLeftRadius: 28, borderBottomRightRadius: 28,

        <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.3 }}>Favorites</div>

      </div>

          color: accent.deep,
          display:'flex', alignItems:'center', justifyContent:'center', marginBottom: 16,

          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 17.3l-6.2 3.7 1.7-7.1L2 9.2l7.2-.6L12 2l2.8 6.6 7.2.6-5.5 4.7 1.7 7.1z"/>

        <div style={{ fontSize: 13, opacity: 0.9, marginTop: 2 }}>Customize your experience</div>

      <div style={{ padding: '18px 16px', display:'flex', flexDirection:'column', gap: 8 }}>
        {rows.map(r => (

// ───────────────────────────────────────────────────────────
// App shell
// ───────────────────────────────────────────────────────────
function App() {
  const tweaks = TWEAKS;
  const [screen, setScreen] = useState(() => localStorage.getItem('cau_screen') || 'home');
  const [category, setCategory] = useState(() => localStorage.getItem('cau_cat') || 'distance');
  const [history, setHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem('cau_history') || '[]'); }
    catch { return []; }
  });

  const accent = ACCENTS[tweaks.accent] || ACCENTS.indigo;

  useEffect(() => { localStorage.setItem('cau_screen', screen); }, [screen]);
  useEffect(() => { localStorage.setItem('cau_cat', category); }, [category]);
  useEffect(() => { localStorage.setItem('cau_history', JSON.stringify(history)); }, [history]);

  const recordHistory = (entry) => {
    setHistory(prev => {
      const filtered = prev.filter(p =>
        !(p.category === entry.category && p.from === entry.from && p.to === entry.to && p.fromValue === entry.fromValue)
      );
      return [entry, ...filtered].slice(0, 20);
    });
  };

  const openCategory = (id) => {
    setCategory(id);
    setScreen('convert');
  };

  const chromeColor = screen === 'convert' ? CATEGORY_COLORS[category].deep : accent.deep;
  const showNav = ['home', 'favorites', 'history', 'settings'].includes(screen);

  return (
    <div style={{
      minHeight: '100vh', display: 'flex',
      alignItems: 'center', justifyContent: 'center',
      padding: '40px 20px',
      background: 'radial-gradient(ellipse at top, #F4F6FA 0%, #E4E7EE 100%)',
    }}>
      <Phone chromeColor={chromeColor} bottomNav={showNav ? <BottomNav active={screen} onChange={setScreen} accent={accent}/> : null}>
        {screen === 'home' && (
          <HomeScreen
            onOpen={openCategory}
            radius={tweaks.radius}
            tileStyle={tweaks.tileStyle}
            accent={accent}
            history={history}
          />
        )}
        {screen === 'favorites' && <FavoritesPlaceholder accent={accent}/>}
        {screen === 'settings'  && <SettingsPlaceholder accent={accent}/>}
        {screen === 'convert' && (
          <ConversionScreen
            categoryId={category}
            onBack={() => setScreen('home')}
            onRecord={recordHistory}
          />
        )}
        {screen === 'history' && (
          <HistoryScreen
            history={history}
            onBack={() => setScreen('home')}
            onClear={() => setHistory([])}
            onOpen={openCategory}
            accent={accent}
          />
        )}
      </Phone>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
