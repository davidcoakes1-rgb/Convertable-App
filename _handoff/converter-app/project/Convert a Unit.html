<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Convert a Unit — Android prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
    background: #E8ECF0;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    color: #1B1B22;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input { font-family: inherit; }
  /* hide scrollbars inside phone */
  .phone-inner::-webkit-scrollbar { width: 0; height: 0; }
  .phone-inner { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/screens.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "teal",
  "tileStyle": "solid",
  "radius": 6,
  "darkMode": false
}/*EDITMODE-END*/;

const ACCENTS = {
  indigo:  { bg: '#6366F1', soft: '#E0E7FF', deep: '#4338CA' },
  teal:    { bg: '#14B8A6', soft: '#CCFBF1', deep: '#0F766E' },
  rose:    { bg: '#F43F5E', soft: '#FFE4E6', deep: '#BE123C' },
  amber:   { bg: '#F59E0B', soft: '#FEF3C7', deep: '#B45309' },
  slate:   { bg: '#475569', soft: '#E2E8F0', deep: '#1E293B' },
};

function NavGestureBar({ color = '#fff' }) {
  return (
    <div style={{
      height: 22, display:'flex', alignItems:'center', justifyContent:'center',
      background:'transparent', flexShrink: 0,
    }}>
      <div style={{ width: 120, height: 4, borderRadius: 4, background: color, opacity: 0.55 }}/>
    </div>
  );
}

function Phone({ children, chromeColor = '#4338CA', bottomNav = null }) {
  return (
    <div style={{
      width: 380, height: 800,
      borderRadius: 52, padding: 10,
      background: 'linear-gradient(160deg, #2A2A33 0%, #0F0F16 100%)',
      boxShadow: '0 40px 90px rgba(20,20,40,0.35), 0 10px 30px rgba(20,20,40,0.2), inset 0 0 0 1.5px rgba(255,255,255,0.08)',
      position: 'relative', flexShrink: 0,
    }}>
      {/* side buttons */}
      <div style={{ position:'absolute', left:-2, top: 140, width: 3, height: 48, borderRadius: 2, background:'#1a1a20' }}/>
      <div style={{ position:'absolute', left:-2, top: 200, width: 3, height: 72, borderRadius: 2, background:'#1a1a20' }}/>
      <div style={{ position:'absolute', right:-2, top: 180, width: 3, height: 92, borderRadius: 2, background:'#1a1a20' }}/>
      <div className="phone-inner" style={{
        width: '100%', height: '100%',
        borderRadius: 42, overflow: 'hidden',
        background: '#FAFAFB',
        display: 'flex', flexDirection: 'column',
        position: 'relative',
      }}>
        <div style={{ flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column' }}>
          {children}
        </div>
        {bottomNav}
        <NavGestureBar color={chromeColor}/>
      </div>
    </div>
  );
}

function FavoritesPlaceholder({ accent }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', background:'#FAFAFB' }}>
      <StatusBar color="#fff" bg={accent.deep} />
      <div style={{
        background: `linear-gradient(160deg, ${accent.bg} 0%, ${accent.deep} 100%)`,
        padding: '14px 20px 26px', color: '#fff',
        borderBottomLeftRadius: 28, borderBottomRightRadius: 28,
      }}>
        <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.3 }}>Favorites</div>
        <div style={{ fontSize: 13, opacity: 0.9, marginTop: 2 }}>Pin conversions you use most</div>
      </div>
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding: 24, textAlign:'center', color:'#9B9BA3' }}>
        <div style={{
          width: 72, height: 72, borderRadius: 24, background: accent.soft,
          color: accent.deep,
          display:'flex', alignItems:'center', justifyContent:'center', marginBottom: 16,
        }}>
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 17.3l-6.2 3.7 1.7-7.1L2 9.2l7.2-.6L12 2l2.8 6.6 7.2.6-5.5 4.7 1.7 7.1z"/>
          </svg>
        </div>
        <div style={{ fontSize: 15, fontWeight: 700, color: '#3B3B45' }}>No favorites yet</div>
        <div style={{ fontSize: 13, marginTop: 6, maxWidth: 240 }}>Long-press a conversion result to pin it here.</div>
      </div>
    </div>
  );
}

function SettingsPlaceholder({ accent }) {
  const rows = [
    { label: 'Theme', value: 'System' },
    { label: 'Decimal places', value: '4' },
    { label: 'Currency rates', value: 'Indicative' },
    { label: 'Clear history', value: '' },
    { label: 'About', value: 'v1.0' },
  ];
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', background:'#FAFAFB' }}>
      <StatusBar color="#fff" bg={accent.deep} />
      <div style={{
        background: `linear-gradient(160deg, ${accent.bg} 0%, ${accent.deep} 100%)`,
        padding: '14px 20px 26px', color: '#fff',
        borderBottomLeftRadius: 28, borderBottomRightRadius: 28,
      }}>
        <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.3 }}>Settings</div>
        <div style={{ fontSize: 13, opacity: 0.9, marginTop: 2 }}>Customize your experience</div>
      </div>
      <div style={{ padding: '18px 16px', display:'flex', flexDirection:'column', gap: 8 }}>
        {rows.map(r => (
          <div key={r.label} style={{
            display:'flex', alignItems:'center', justifyContent:'space-between',
            padding: '14px 16px', background:'#fff', borderRadius: 14,
            boxShadow: '0 1px 2px rgba(0,0,0,0.04)',
          }}>
            <div style={{ fontSize: 14, fontWeight: 600, color:'#2A2A33' }}>{r.label}</div>
            <div style={{ fontSize: 13, color: '#9B9BA3', fontWeight: 600 }}>{r.value}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaksAvailable, setTweaksAvailable] = useState(false);
  const [screen, setScreen] = useState(() => localStorage.getItem('cau_screen') || 'home');
  const [category, setCategory] = useState(() => localStorage.getItem('cau_cat') || 'distance');
  const [history, setHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem('cau_history') || '[]'); }
    catch { return []; }
  });

  const accent = ACCENTS[tweaks.accent] || ACCENTS.indigo;

  // Tweaks protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    setTweaksAvailable(true);
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => { localStorage.setItem('cau_screen', screen); }, [screen]);
  useEffect(() => { localStorage.setItem('cau_cat', category); }, [category]);
  useEffect(() => { localStorage.setItem('cau_history', JSON.stringify(history)); }, [history]);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const recordHistory = (entry) => {
    setHistory(prev => {
      // dedupe last entry if same
      const filtered = prev.filter(p =>
        !(p.category === entry.category && p.from === entry.from && p.to === entry.to && p.fromValue === entry.fromValue)
      );
      return [entry, ...filtered].slice(0, 20);
    });
  };

  const openCategory = (id) => {
    setCategory(id);
    setScreen('convert');
  };

  const chromeColor = screen === 'convert' ? CATEGORY_COLORS[category].deep : accent.deep;
  const showNav = ['home', 'favorites', 'history', 'settings'].includes(screen);

  return (
    <div style={{
      minHeight: '100vh', display: 'flex',
      alignItems: 'center', justifyContent: 'center',
      padding: '40px 20px',
      background: 'radial-gradient(ellipse at top, #F4F6FA 0%, #E4E7EE 100%)',
    }}>
      <div style={{ display:'flex', gap: 40, alignItems:'center', flexWrap:'wrap', justifyContent:'center' }}>
        <div data-screen-label={screen === 'home' ? 'Home' : screen === 'convert' ? `Convert · ${CATEGORIES[category].name}` : screen === 'history' ? 'History' : screen === 'favorites' ? 'Favorites' : 'Settings'}>
          <Phone chromeColor={chromeColor} bottomNav={showNav ? <BottomNav active={screen} onChange={setScreen} accent={accent}/> : null}>
            {screen === 'home' && (
              <HomeScreen
                onOpen={openCategory}
                onHistory={() => setScreen('history')}
                radius={tweaks.radius}
                tileStyle={tweaks.tileStyle}
                accent={accent}
                history={history}
              />
            )}
            {screen === 'favorites' && (
              <FavoritesPlaceholder onBack={() => setScreen('home')} accent={accent}/>
            )}
            {screen === 'settings' && (
              <SettingsPlaceholder onBack={() => setScreen('home')} accent={accent}/>
            )}
            {screen === 'convert' && (
              <ConversionScreen
                categoryId={category}
                onBack={() => setScreen('home')}
                onRecord={recordHistory}
                accent={accent}
              />
            )}
            {screen === 'history' && (
              <HistoryScreen
                history={history}
                onBack={() => setScreen('home')}
                onClear={() => setHistory([])}
                onOpen={openCategory}
                accent={accent}
              />
            )}
          </Phone>
        </div>

        {tweaksOpen && (
          <TweaksPanel tweaks={tweaks} onChange={updateTweak} onClose={() => setTweaksOpen(false)}/>
        )}
      </div>
    </div>
  );
}

function TweaksPanel({ tweaks, onChange, onClose }) {
  return (
    <div style={{
      width: 280, background: '#fff', borderRadius: 22,
      boxShadow: '0 20px 60px rgba(20,20,40,0.18), 0 4px 12px rgba(20,20,40,0.08)',
      padding: 20, fontFamily: '"Plus Jakarta Sans", system-ui, sans-serif',
    }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 16 }}>
        <div style={{ fontSize: 16, fontWeight: 800, letterSpacing: -0.3 }}>Tweaks</div>
        <button onClick={onClose} style={{
          all:'unset', cursor:'pointer', width: 28, height: 28, borderRadius: 10,
          display:'flex', alignItems:'center', justifyContent:'center', color:'#6B6B76',
        }}>
          <div style={{ width: 18, height: 18 }}>{ICONS.close}</div>
        </button>
      </div>

      <TweakLabel>Accent</TweakLabel>
      <div style={{ display:'flex', gap: 8, marginBottom: 20 }}>
        {Object.entries(ACCENTS).map(([k, a]) => (
          <button key={k} onClick={() => onChange('accent', k)}
            style={{
              all:'unset', cursor:'pointer',
              width: 38, height: 38, borderRadius: 12, background: a.bg,
              display:'flex', alignItems:'center', justifyContent:'center',
              color:'#fff', boxShadow: tweaks.accent === k ? `0 0 0 3px ${a.bg}40, 0 0 0 1px ${a.deep}` : 'none',
              transition: 'box-shadow 160ms',
            }}>
            {tweaks.accent === k && <div style={{ width: 16, height: 16 }}>{ICONS.check}</div>}
          </button>
        ))}
      </div>

      <TweakLabel>Tile style</TweakLabel>
      <div style={{ display:'flex', gap: 8, marginBottom: 20 }}>
        {[['solid','Solid'],['soft','Soft']].map(([k,l]) => (
          <button key={k} onClick={() => onChange('tileStyle', k)}
            style={{
              all:'unset', cursor:'pointer', flex: 1,
              padding: '10px 12px', borderRadius: 12, textAlign:'center',
              fontSize: 13, fontWeight: 700,
              background: tweaks.tileStyle === k ? '#1B1B22' : '#F1F2F6',
              color: tweaks.tileStyle === k ? '#fff' : '#3B3B45',
            }}>{l}</button>
        ))}
      </div>

      <TweakLabel>Corner radius: {tweaks.radius}px</TweakLabel>
      <input type="range" min="6" max="28" step="2" value={tweaks.radius}
        onChange={e => onChange('radius', Number(e.target.value))}
        style={{ width: '100%', accentColor: '#6366F1', marginBottom: 4 }}/>
    </div>
  );
}

function TweakLabel({ children }) {
  return (
    <div style={{
      fontSize: 11, fontWeight: 800, letterSpacing: 1.2,
      textTransform: 'uppercase', color: '#9B9BA3', marginBottom: 8,
    }}>{children}</div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
